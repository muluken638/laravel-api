name: Deploy Laravel API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set +e

            echo "🚀 Starting deployment"

            cd /home/atmplcrz/laravel-api

            echo "⬇️ Git pull"
            git pull origin main

            echo "🐘 PHP version"
            /usr/local/bin/php -v

            echo "🧹 Clearing caches (safe mode)"
            /usr/local/bin/php artisan config:clear
            /usr/local/bin/php artisan route:clear
            /usr/local/bin/php artisan view:clear

            echo "⚙️ Rebuilding cache"
            /usr/local/bin/php artisan config:cache
            /usr/local/bin/php artisan route:cache

            echo "🗄️ Running migrations"
            /usr/local/bin/php artisan migrate --force

            echo "✅ Deployment finished"
